# ServiSuite Upptime Configuration
# Repo: https://github.com/Harris-Barrick-Software/servisuite-upptime

owner: Harris-Barrick-Software
repo: servisuite-upptime

sites: []

# --- Status Page ---
status-website:
  cname: status.servisuite.com
  logoUrl: https://servisuite.com/logo.png
  name: ServiSuite Status
  introTitle: "**ServiSuite** System Status"
  introMessage: This is the real-time status page for [ServiSuite](https://servisuite.com). If you're experiencing issues, check below for details or [contact support](mailto:support@servisuite.com).
  theme: light
  navbar:
    - title: Status
      href: /
    - title: ServiSuite
      href: https://servisuite.com
    - title: Support
      href: mailto:support@servisuite.com

# --- Incidents ---
skipDeleteIssues: true
assignees:
  # Add GitHub usernames of team members to auto-assign on incidents
  # - your-github-username

# --- Notifications ---
notifications:
  - type: discord
    # Create a Discord webhook and add as a repo secret named DISCORD_WEBHOOK_URL
    # Webhook URL format: https://discord.com/api/webhooks/{id}/{token}
    url: $DISCORD_WEBHOOK_URL

# --- Schedule ---
# Check every 5 minutes (default)
workflowSchedule:
  uptime: "*/5 * * * *"
  responseTime: "0 */6 * * *"
  graphs: "0 0 * * *"
  staticSite: "0 0 * * *"
  summary: "0 0 * * *"
